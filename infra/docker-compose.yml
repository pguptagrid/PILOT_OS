version: "3.9"
services:
  backend:
    build:
      context: .
      dockerfile: infra/Dockerfile.backend
    ports: ["8000:8000"]
    volumes:
      - pilot_data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/pilot.db
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: .
      dockerfile: infra/Dockerfile.frontend
    ports: ["3000:80"]
    depends_on: [backend]

volumes:
  pilot_data:
